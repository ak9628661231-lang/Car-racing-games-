<!DOCTYPE html>
<html>
<head>
<title>Car Racing</title>
<style>
body{
margin:0;
background:gray;
overflow:hidden;
}
#road{
width:300px;
height:100vh;
background:black;
margin:auto;
position:relative;
}
#car{
width:50px;
height:90px;
background:red;
position:absolute;
bottom:20px;
left:125px;
border-radius:10px;
}
</style>
</head>

<body>

<div id="road">
<div id="car"></div>
</div>

<script>
let car=document.getElementById("car");
let x=125;

document.addEventListener("touchmove",(e)=>{
x=e.touches[0].clientX-80;

if(x<0)x=0;
if(x>250)x=250;

car.style.left=x+"px";
});
</script>

</body>
</html>
